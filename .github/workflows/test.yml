name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bank_statement_ocr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Run tests with coverage
        run: npm run test:coverage --workspace=backend
        env:
          NODE_ENV: test
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/bank_statement_ocr_test
          JWT_SECRET: ci-test-secret-key-minimum-32-chars!!
          ALLOWED_ORIGINS: http://localhost:3000
          MAX_FILE_SIZE_MB: '10'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests with coverage
        run: npm run test:coverage --workspace=frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
